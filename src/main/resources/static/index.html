<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <!-- Bootstrap (for responsiveness) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Our CSS -->
	<link rel="stylesheet" href="/css/style.css?v=2">
</head>

<body>
	
	<div style="position:absolute; top:20px; right:20px;">
			    <button onclick="logout()" class="btn btn-danger">Logout</button>
			
			</div>
	
	
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card-box">
		
        <h2 class="title">Student Registration</h2>

		<form id="studentForm">

            <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name" required>

            <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>

            <input type="text" name="course" class="form-control mb-3" placeholder="Enter Course" required>

            <button class="btn btn-primary w-100">Register</button>

			<a href="students.html" class="btn btn-light mt-3 w-100">View Students</a>
			
        </form>
     
    </div>

</div>
<script src="js/script.js"></script>
</body>










</html>
